# Test configuration
# Override intake service URL to use WireMock (configured by ConnectorIntakeWireMockTestResource)
%test.quarkus.rest-client.connector-intake.url=http://${wiremock.host}:${wiremock.port}


# Kafka channel-to-topic mapping
# Keep outgoing and incoming on different default topics so non-intake tests
# that publish events do not accidentally trigger the consumer.
# Tests that validate end-to-end intake should override BOTH channels to the same
# unique topic via @TestProfile.
mp.messaging.outgoing.s3-crawl-events-out.topic=s3-crawl-events-test-default
mp.messaging.incoming.s3-crawl-events-in.topic=s3-crawl-events-test-consumer-default
%test.mp.messaging.incoming.s3-crawl-events-in.failure-strategy=ignore
